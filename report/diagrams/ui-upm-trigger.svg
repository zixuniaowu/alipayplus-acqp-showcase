<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">User-presented trigger example</title>
  <desc id="desc">Generic screens showing the wallet code display and the store scan trigger for the user-presented flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eff5fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#23314d" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9232e"/>
    </marker>
    <style>
      .title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #18253a; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #24354f; }
      .body { font: 14px 'Segoe UI', Arial, sans-serif; fill: #44546c; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #5e6d84; }
      .hot { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .tag { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #9b1c1c; }
      .box { fill: #fff; stroke: #d7dfeb; stroke-width: 2; rx: 18; }
      .phone { fill: #0f1726; rx: 28; }
      .screen { fill: #f8fbff; rx: 18; }
      .panel { fill: #f9fbff; stroke: #d7dfeb; stroke-width: 2; rx: 18; }
      .button { fill: #eef3ff; stroke: #bfd0f5; stroke-width: 1.5; rx: 12; }
      .buttonHot { fill: #d9232e; stroke: #b31622; stroke-width: 1.5; rx: 12; }
      .callout { fill: #fff4f4; stroke: #d9232e; stroke-width: 2; rx: 14; }
      .line { stroke: #d9232e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="40" y="54" class="title">Generic trigger screens: User-presented payment</text>

  <g filter="url(#shadow)">
    <rect x="42" y="94" width="384" height="590" class="box"/>
    <text x="64" y="130" class="label">Screen A. Wallet payment code</text>
    <rect x="110" y="156" width="248" height="472" class="phone"/>
    <rect x="128" y="188" width="212" height="408" class="screen"/>
    <text x="148" y="224" class="label" style="font-size:16px;">Show payment code</text>
    <rect x="162" y="254" width="144" height="144" fill="#fff" stroke="#d1dae8" stroke-width="2"/>
    <path d="M176 268 h24 v24 h-24 z M268 268 h24 v24 h-24 z M176 360 h24 v24 h-24 z" fill="#111827"/>
    <rect x="152" y="422" width="164" height="40" rx="8" fill="#111827"/>
    <rect x="150" y="482" width="168" height="48" class="buttonHot"/>
    <text x="171" y="512" class="hot">Open code screen</text>
    <text x="64" y="662" class="small">The wallet side generates and shows the customer code before the store does anything.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="466" y="94" width="344" height="590" class="box"/>
    <text x="488" y="130" class="label">Screen B. Store POS scanner</text>
    <rect x="514" y="174" width="248" height="188" class="panel"/>
    <text x="540" y="212" class="label" style="font-size:16px;">Store POS</text>
    <rect x="546" y="238" width="140" height="14" rx="7" fill="#dfe8f7"/>
    <rect x="546" y="266" width="96" height="12" rx="6" fill="#edf2fb"/>
    <rect x="546" y="302" width="184" height="48" class="buttonHot"/>
    <text x="573" y="332" class="hot">Scan customer code</text>
    <rect x="514" y="404" width="248" height="192" class="panel"/>
    <text x="540" y="442" class="label" style="font-size:16px;">Result panel</text>
    <rect x="546" y="470" width="156" height="44" class="button"/>
    <text x="582" y="497" class="body">Pending</text>
    <rect x="546" y="530" width="156" height="44" class="button"/>
    <text x="578" y="557" class="body">Complete sale</text>
    <text x="488" y="662" class="small">The POS scan action is the first trigger that enters your own ACQP flow.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="94" width="388" height="590" class="box"/>
    <text x="872" y="130" class="label">Screen C. Cashier outcome</text>
    <rect x="918" y="176" width="252" height="160" class="panel"/>
    <text x="946" y="214" class="label" style="font-size:16px;">Cashier sees result</text>
    <circle cx="984" cy="274" r="28" fill="#d8f2df"/>
    <path d="M972 274 l10 10 l20 -22" fill="none" stroke="#2f8f4e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1024" y="280" class="body">Success</text>
    <rect x="918" y="374" width="252" height="180" class="panel"/>
    <text x="946" y="414" class="label" style="font-size:16px;">Finish at counter</text>
    <rect x="948" y="448" width="188" height="52" class="buttonHot"/>
    <text x="988" y="480" class="hot">Complete checkout</text>
    <text x="872" y="662" class="small">The cashier acts only after your backend returns or confirms the final status.</text>
  </g>

  <g>
    <rect x="274" y="492" width="218" height="74" class="callout"/>
    <text x="294" y="518" class="tag">TRIGGER 1</text>
    <text x="294" y="542" class="body">Open code screen</text>
    <text x="294" y="562" class="body">Starts S01 -> S06</text>
    <path d="M492 530 C530 530, 552 328, 566 328" class="line"/>

    <rect x="724" y="290" width="228" height="74" class="callout"/>
    <text x="744" y="316" class="tag">TRIGGER 2</text>
    <text x="744" y="340" class="body">Scan customer code</text>
    <text x="744" y="360" class="body">Starts S07 -> S10</text>
    <path d="M952 328 C980 328, 988 328, 1000 328" class="line"/>
  </g>
</svg>
