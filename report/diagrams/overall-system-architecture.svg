4.6045" x="933.56" y="584.3269"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.6045" x="943.56" y="607.322">Finance Console</text></g><!--entity ClearingBank--><g class="entity" data-qualified-name="8. External Accounts . Banks.ClearingBank" data-source-line="68" id="ent0027"><rect fill="#F1F1F1" height="36.2969" rx="7" ry="7" style="stroke:#181818;stroke-width:0.5;" width="117.877" x="1253.93" y="699.6169"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.877" x="1263.93" y="722.612">Clearing Bank</text></g><!--entity SettlementAccount--><g class="entity" data-qualified-name="8. External Accounts . Banks.SettlementAccount" data-source-line="69" id="ent0028"><rect fill="#F1F1F1" height="36.2969" rx="7" ry="7" style="stroke:#181818;stroke-width:0.5;" width="202.082" x="1211.82" y="792.4469"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182.082" x="1221.82" y="815.442">ACQP Settlement Account</text></g><!--entity MerchantBank--><g class="entity" data-qualified-name="8. External Accounts . Banks.MerchantBank" data-source-line="70" id="ent0029"><rect fill="#F1F1F1" height="36.2969" rx="7" ry="7" style="stroke:#181818;stroke-width:0.5;" width="237.7246" x="934" y="792.4469"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="217.7246" x="944" y="815.442">Merchant / Store Bank Account</text></g><g class="entity" data-qualified-name="GMN62" data-source-line="116" id="ent0063"><path d="M1108.46,315.0469 L1108.46,341.3125 A7,7 0 0 0 1115.46,348.3125 L1450.2784,348.3125 A7,7 0 0 0 1457.2784,341.3125 L1457.2784,318.0469 L1447.2784,308.0469 L1115.46,308.0469 A7,7 0 0 0 1108.46,315.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1447.2784,308.0469 L1447.2784,314.5469 A3.5,3.5 0 0 0 1450.7784,318.0469 L1457.2784,318.0469 L1447.2784,308.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.8184" x="1114.46" y="325.1138">Store-side systems connect to your platform here.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.6475" x="1154.5454" y="340.2466">They do not call Alipay+ APIs directly.</text></g><g class="entity" data-qualified-name="GMN65" data-source-line="121" id="ent0066"><path d="M918.07,481.6169 L918.07,490.7469 L836.47,494.7469 L918.07,498.7469 L918.07,507.8825 A7,7 0 0 0 925.07,514.8825 L1240.6677,514.8825 A7,7 0 0 0 1247.6677,507.8825 L1247.6677,484.6169 L1237.6677,474.6169 L925.07,474.6169 A7,7 0 0 0 918.07,481.6169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1237.6677,474.6169 L1237.6677,481.1169 A3.5,3.5 0 0 0 1241.1677,484.6169 L1247.6677,484.6169 L1237.6677,474.6169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.5977" x="924.07" y="491.6838">Only your backend calls Alipay+ payment APIs.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.8657" x="926.936" y="506.8166">Frontend never signs Alipay+ server requests.</text></g><g class="entity" data-qualified-name="GMN68" data-source-line="126" id="ent0069"><path d="M25.18,697.0669 L25.18,738.4653 A7,7 0 0 0 32.18,745.4653 L357.553,745.4653 A7,7 0 0 0 364.553,738.4653 L364.553,700.0669 L354.553,690.0669 L32.18,690.0669 A7,7 0 0 0 25.18,697.0669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M354.553,690.0669 L354.553,696.5669 A3.5,3.5 0 0 0 358.053,700.0669 L364.553,700.0669 L354.553,690.0669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.373" x="31.18" y="707.1338">Internal support capabilities are intentionally not</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.3242" x="67.7044" y="722.2666">drawn as separate lines in this figure.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.0952" x="47.3189" y="737.3994">They belong inside your platform boundary.</text></g><g class="entity" data-qualified-name="GMN71" data-source-line="132" id="ent0072"><path d="M1446.04,704.6369 L1446.04,730.9025 A7,7 0 0 0 1453.04,737.9025 L1838.6967,737.9025 A7,7 0 0 0 1845.6967,730.9025 L1845.6967,707.6369 L1835.6967,697.6369 L1453.04,697.6369 A7,7 0 0 0 1446.04,704.6369" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1835.6967,697.6369 L1835.6967,704.1369 A3.5,3.5 0 0 0 1839.1967,707.6369 L1845.6967,707.6369 L1835.6967,697.6369" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.9043" x="1510.4162" y="714.7038">Callback success is operational success.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="378.6567" x="1452.04" y="729.8366">Settlement and merchant payout are later financial steps.</text></g><g class="entity" data-qualified-name="GMN74" data-source-line="137" id="ent0075"><path d="M1454.17,797.4669 L1454.17,823.7325 A7,7 0 0 0 1461.17,830.7325 L1754.5572,830.7325 A7,7 0 0 0 1761.5572,823.7325 L1761.5572,800.4669 L1751.5572,790.4669 L1461.17,790.4669 A7,7 0 0 0 1454.17,797.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1751.5572,790.4669 L1751.5572,796.9669 A3.5,3.5 0 0 0 1755.0572,800.4669 L1761.5572,800.4669 L1751.5572,790.4669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.3872" x="1460.17" y="807.5338">Merchant payout is your own contra